---
apiVersion: appstudio.redhat.com/v1alpha1
kind: ReleasePlanAdmission
metadata:
  name: test-component
  labels:
    release.appstudio.openshift.io/auto-release: 'true'
spec:
  applications:
    - test-component
  data:
    mapping:
      components:
        - name: test-component
          repository: registry-service.kind-registry/test-component-release
          tags:
            - latest
  origin: user-ns2
  pipeline:
    pipelineRef:
      resolver: git
      # ociStorage: the OCI repository used to store Trusted Artifacts between tasks.
      # Note: the in-cluster registry uses a self-signed certificate. TLS verification
      # for Trusted Artifact operations cannot be configured via the RPA — pipelineRef.params
      # are resolver params only and do not reach the pipeline. To use the in-cluster
      # registry for TA storage, the registry's CA must be trusted at the cluster level.
      # See docs/guides/registry-configuration.md for details.
      ociStorage: registry-service.kind-registry/test-component-release-ta
      params:
        - name: url
          value: "https://github.com/konflux-ci/release-service-catalog.git"
        - name: revision
          value: development
        - name: pathInRepo
          value: "pipelines/managed/push-to-external-registry/push-to-external-registry.yaml"
    serviceAccountName: release-pipeline
  policy: default
