---
apiVersion: appstudio.redhat.com/v1alpha1
kind: ReleasePlanAdmission
metadata:
  name: sample-component
  labels:
    release.appstudio.openshift.io/auto-release: 'true'
spec:
  applications:
    - sample-component
  data:
    images:
      addGitShaTag: true
      floatingTags:
        - latest
    mapping:
      components:
        - name: sample-component
          repository: <repository url>
  origin: user-ns1
  pipeline:
    pipelineRef:
      resolver: git
      # Set ociStorage to your own OCI repository for Trusted Artifacts storage.
      # Examples:
      #   Quay:       ociStorage: quay.io/my-org/sample-component-release-ta
      #   In-cluster: ociStorage: registry-service.kind-registry/sample-component-release-ta
      # If omitted, the pipeline default (quay.io/konflux-ci/release-service-trusted-artifacts)
      # is used, which requires push access and is not suitable for production.
      # ociStorage: quay.io/my-org/sample-component-release-ta
      params:
        - name: url
          value: "https://github.com/konflux-ci/release-service-catalog.git"
        - name: revision
          value: 0cbe8aebf8b85763b724dc292641d2c587f13b6e
        - name: pathInRepo
          value: "pipelines/managed/push-to-external-registry/push-to-external-registry.yaml"
    serviceAccountName: release-pipeline
  policy: default
