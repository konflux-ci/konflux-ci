apiVersion: appstudio.redhat.com/v1beta2
kind: IntegrationTestScenario
metadata:
  name: test-hello
  namespace: user-ns2
spec:
  application: test-component
  contexts:
    - description: Application testing
      name: application
  resolverRef:
    params:
      - name: url
        value: 'https://github.com/konflux-ci/konflux-ci'
      - name: revision
        value: main
      - name: pathInRepo
        value: test/resources/integration-tests/testrepo-integration.yaml
    resolver: git
