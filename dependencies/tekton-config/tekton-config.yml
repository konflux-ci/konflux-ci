---
apiVersion: operator.tekton.dev/v1alpha1
kind: TektonConfig
metadata:
  name: config
spec:
  profile: basic
  targetNamespace: tekton-pipelines
  platforms:
    kubernetes:
      pipelinesAsCode:
        enable: true
        settings:
          application-name: Local Konflux
          custom-console-name: Local Konflux
          custom-console-url: 'https://localhost:9443'
          custom-console-url-namespace: 'https://localhost:9443/ns/{{ namespace }}'
          custom-console-url-pr-details: 'https://localhost:9443/ns/{{ namespace }}/pipelinerun/{{ pr }}'
          custom-console-url-pr-tasklog: 'https://localhost:9443/ns/{{ namespace }}/pipelinerun/{{ pr }}/logs/{{ task }}'
  pruner:
    resources:
    - pipelinerun
    - taskrun
    keep: 100
    schedule: "0 8 * * *"
  chain:
    artifacts.oci.storage: oci
    artifacts.pipelinerun.enable-deep-inspection: "true"
    artifacts.pipelinerun.format: in-toto
    artifacts.pipelinerun.storage: oci
    artifacts.taskrun.format: in-toto
    artifacts.taskrun.storage: ""
    transparency.enabled: "false"
    options:
      disabled: false
      deployments:
        tekton-chains-controller:
          spec:
            template:
              spec:
                volumes:
                  - name: trusted-ca
                    configMap:
                      name: trusted-ca
                      items:
                        - key: ca-bundle.crt
                          path: ca-bundle.crt
                      optional: true
                containers:
                  - name: tekton-chains-controller
                    volumeMounts:
                      - name: trusted-ca
                        mountPath: /etc/ssl/certs
                        readOnly: true
  result:
    disabled: false
  pipeline:
    default-service-account: default
    options:
      disabled: false
      configMaps:
        config-defaults:
          data:
            default-imagepullbackoff-timeout: "15m"
        bundleresolver-config:
          data:
            fetch-timeout: "2m"
            backoff-duration: "15s"
            backoff-factor: "2.0"
            backoff-steps: "10"
            backoff-cap: "15m"
        git-resolver-config:
          data:
            fetch-timeout: "2m"
      deployments:
        tekton-pipelines-remote-resolvers:
          spec:
            template:
              spec:
                volumes:
                  - name: trusted-ca
                    configMap:
                      name: trusted-ca
                      items:
                        - key: ca-bundle.crt
                          path: ca-bundle.crt
                      optional: true
                containers:
                  - name: controller
                    env:
                      - name: GIT_SSL_CAINFO
                        value: /etc/ssl/certs/ca-bundle.crt
                    volumeMounts:
                      - name: trusted-ca
                        mountPath: /etc/ssl/certs
                        readOnly: true
