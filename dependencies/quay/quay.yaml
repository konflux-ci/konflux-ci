---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quay
  namespace: quay
  labels:
    app: quay
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: >-
      Quay writes to system CA trust store paths at startup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quay
  template:
    metadata:
      labels:
        app: quay
    spec:
      initContainers:
      - name: patch-nginx-conf
        image: quay.io/projectquay/quay
        command:
          - /bin/sh
          - -ec
          - |
            src=/quay-registry/conf/nginx/server-base.conf.jnj
            dst=/nginx-patch/server-base.conf.jnj
            pattern='proxy_set_header Host $host;'
            replacement='proxy_set_header Host $http_host;'

            if ! grep -q "$pattern" "$src"; then
              echo "ERROR: expected pattern not found in $src — upstream template may have changed" >&2
              exit 1
            fi
            sed "s/$pattern/$replacement/g" "$src" > "$dst"
            if ! grep -q "$replacement" "$dst"; then
              echo "ERROR: patched file $dst does not contain expected line" >&2
              exit 1
            fi
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: nginx-patch
          mountPath: /nginx-patch
      containers:
      - name: quay
        image: quay.io/projectquay/quay
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            cpu: 200m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi
        startupProbe:
          httpGet:
            path: /health/instance
            port: 8443
            scheme: HTTPS
          periodSeconds: 10
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health/instance
            port: 8443
            scheme: HTTPS
          periodSeconds: 10
          failureThreshold: 3
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: config-stack
          mountPath: /conf/stack
          readOnly: true
        - name: storage
          mountPath: /datastorage
        - name: nginx-patch
          mountPath: /quay-registry/conf/nginx/server-base.conf.jnj
          subPath: server-base.conf.jnj
          readOnly: true
      volumes:
      - name: config-stack
        projected:
          sources:
          - secret:
              name: quay-config
              items:
              - key: config.yaml
                path: config.yaml
          - secret:
              name: quay-tls
              items:
              - key: tls.crt
                path: ssl.cert
              - key: tls.key
                path: ssl.key
      - name: storage
        emptyDir: {}
      - name: nginx-patch
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: quay-service
  namespace: quay
spec:
  type: NodePort
  selector:
    app: quay
  ports:
  - name: https
    protocol: TCP
    nodePort: 30002
    port: 443
    targetPort: 8443
