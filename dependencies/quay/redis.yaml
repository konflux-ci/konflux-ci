---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quay-redis
  namespace: quay
  labels:
    app: quay-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quay-redis
  template:
    metadata:
      labels:
        app: quay-redis
    spec:
      containers:
      - name: redis
        image: quay.io/sclorg/redis-7-c9s
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        resources:
          requests:
            cpu: 5m
            memory: 8Mi
          limits:
            cpu: 100m
            memory: 64Mi
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: quay-redis
  namespace: quay
spec:
  selector:
    app: quay-redis
  ports:
  - port: 6379
    targetPort: 6379
