apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit shared base resources from tekton-chains-rbac
resources:
  - ../tekton-chains-rbac/base

# Transform all namespaces to openshift-pipelines
namespace: openshift-pipelines

patchesJson6902:
  # Fix RoleBinding subjects to reference SA in openshift-pipelines (not tekton-pipelines)
  - target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: RoleBinding
      name: chains-secret-admin
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: openshift-pipelines
images:
  - name: quay.io/konflux-ci/appstudio-utils
    digest: sha256:366636b0a749700571c862529065b6820b486a770a3b17eaf543e11ac238e837

  # Set TARGET_NAMESPACE for OCP and apply stricter security context
  - target:
      group: batch
      version: v1
      kind: Job
      name: tekton-chains-signing-secret
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "openshift-pipelines"
      - op: replace
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
