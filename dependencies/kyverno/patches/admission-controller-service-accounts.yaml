# Kyverno v1.17.1 install.yaml hard-codes policy-validation subjects under the
# default "kyverno" namespace. Re-home them to match namespace: konflux-kyverno.
# Re-verify arg indices when upgrading the install.yaml release pin.
- op: test
  path: /spec/template/spec/containers/0/args/3
  value: --backgroundServiceAccountName=system:serviceaccount:kyverno:kyverno-background-controller
- op: replace
  path: /spec/template/spec/containers/0/args/3
  value: --backgroundServiceAccountName=system:serviceaccount:konflux-kyverno:kyverno-background-controller
- op: test
  path: /spec/template/spec/containers/0/args/4
  value: --reportsServiceAccountName=system:serviceaccount:kyverno:kyverno-reports-controller
- op: replace
  path: /spec/template/spec/containers/0/args/4
  value: --reportsServiceAccountName=system:serviceaccount:konflux-kyverno:kyverno-reports-controller
