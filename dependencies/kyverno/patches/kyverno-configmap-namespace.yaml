# Strategic-merge patch for ConfigMap kyverno (Kyverno v1.17.1 install.yaml).
# Updates namespace "kyverno" -> "konflux-kyverno" in Kyverno runtime config.
# Names like kyverno:background-controller are ClusterRole resource names, not namespaces.
# Regenerate resourceFilters from upstream when bumping install.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kyverno
data:
  # Namespaces excluded from Kyverno resource admission webhooks.
  webhooks: >-
    {"namespaceSelector":{"matchExpressions":[
    {"key":"kubernetes.io/metadata.name","operator":"NotIn","values":["kube-system"]},
    {"key":"kubernetes.io/metadata.name","operator":"NotIn","values":["konflux-kyverno"]}
    ],"matchLabels":null}}
  # [kind,namespace,name] entries skipped by admission (not background reporting).
  resourceFilters: >-
    [{"key":"kubernetes.io/metadata.name","operator":"NotIn","values":["kube-system"]
    ["konflux-kyverno"]
    [*/*,konflux-kyverno,*]
    [Event,*,*]
    [*/*,kube-system,*]
    [*/*,kube-public,*]
    [*/*,kube-node-lease,*]
    [Node,*,*]
    [Node/?*,*,*]
    [APIService,*,*]
    [APIService/?*,*,*]
    [TokenReview,*,*]
    [SubjectAccessReview,*,*]
    [SelfSubjectAccessReview,*,*]
    [Binding,*,*]
    [Pod/binding,*,*]
    [ReplicaSet,*,*]
    [ReplicaSet/?*,*,*]
    [EphemeralReport,*,*]
    [ClusterEphemeralReport,*,*]
    [ClusterRole,*,kyverno:admission-controller]
    [ClusterRole,*,kyverno:admission-controller:core]
    [ClusterRole,*,kyverno:admission-controller:additional]
    [ClusterRole,*,kyverno:background-controller]
    [ClusterRole,*,kyverno:background-controller:core]
    [ClusterRole,*,kyverno:background-controller:additional]
    [ClusterRole,*,kyverno:cleanup-controller]
    [ClusterRole,*,kyverno:cleanup-controller:core]
    [ClusterRole,*,kyverno:cleanup-controller:additional]
    [ClusterRole,*,kyverno:reports-controller]
    [ClusterRole,*,kyverno:reports-controller:core]
    [ClusterRole,*,kyverno:reports-controller:additional]
    [ClusterRoleBinding,*,kyverno:admission-controller]
    [ClusterRoleBinding,*,kyverno:background-controller]
    [ClusterRoleBinding,*,kyverno:cleanup-controller]
    [ClusterRoleBinding,*,kyverno:reports-controller]
    [ServiceAccount,konflux-kyverno,kyverno-admission-controller]
    [ServiceAccount/?*,konflux-kyverno,kyverno-admission-controller]
    [ServiceAccount,konflux-kyverno,kyverno-background-controller]
    [ServiceAccount/?*,konflux-kyverno,kyverno-background-controller]
    [ServiceAccount,konflux-kyverno,kyverno-cleanup-controller]
    [ServiceAccount/?*,konflux-kyverno,kyverno-cleanup-controller]
    [ServiceAccount,konflux-kyverno,kyverno-reports-controller]
    [ServiceAccount/?*,konflux-kyverno,kyverno-reports-controller]
    [Role,konflux-kyverno,kyverno:admission-controller]
    [Role,konflux-kyverno,kyverno:background-controller]
    [Role,konflux-kyverno,kyverno:cleanup-controller]
    [Role,konflux-kyverno,kyverno:reports-controller]
    [RoleBinding,konflux-kyverno,kyverno:admission-controller]
    [RoleBinding,konflux-kyverno,kyverno:background-controller]
    [RoleBinding,konflux-kyverno,kyverno:cleanup-controller]
    [RoleBinding,konflux-kyverno,kyverno:reports-controller]
    [ConfigMap,konflux-kyverno,kyverno]
    [ConfigMap,konflux-kyverno,kyverno-metrics]
    [Deployment,konflux-kyverno,kyverno-admission-controller]
    [Deployment/?*,konflux-kyverno,kyverno-admission-controller]
    [Deployment,konflux-kyverno,kyverno-background-controller]
    [Deployment/?*,konflux-kyverno,kyverno-background-controller]
    [Deployment,konflux-kyverno,kyverno-cleanup-controller]
    [Deployment/?*,konflux-kyverno,kyverno-cleanup-controller]
    [Deployment,konflux-kyverno,kyverno-reports-controller]
    [Deployment/?*,konflux-kyverno,kyverno-reports-controller]
    [Pod,konflux-kyverno,kyverno-admission-controller-*]
    [Pod/?*,konflux-kyverno,kyverno-admission-controller-*]
    [Pod,konflux-kyverno,kyverno-background-controller-*]
    [Pod/?*,konflux-kyverno,kyverno-background-controller-*]
    [Pod,konflux-kyverno,kyverno-cleanup-controller-*]
    [Pod/?*,konflux-kyverno,kyverno-cleanup-controller-*]
    [Pod,konflux-kyverno,kyverno-reports-controller-*]
    [Pod/?*,konflux-kyverno,kyverno-reports-controller-*]
    [Job,konflux-kyverno,kyverno-hook-pre-delete]
    [Job/?*,konflux-kyverno,kyverno-hook-pre-delete]
    [NetworkPolicy,konflux-kyverno,kyverno-admission-controller]
    [NetworkPolicy/?*,konflux-kyverno,kyverno-admission-controller]
    [NetworkPolicy,konflux-kyverno,kyverno-background-controller]
    [NetworkPolicy/?*,konflux-kyverno,kyverno-background-controller]
    [NetworkPolicy,konflux-kyverno,kyverno-cleanup-controller]
    [NetworkPolicy/?*,konflux-kyverno,kyverno-cleanup-controller]
    [NetworkPolicy,konflux-kyverno,kyverno-reports-controller]
    [NetworkPolicy/?*,konflux-kyverno,kyverno-reports-controller]
    [PodDisruptionBudget,konflux-kyverno,kyverno-admission-controller]
    [PodDisruptionBudget/?*,konflux-kyverno,kyverno-admission-controller]
    [PodDisruptionBudget,konflux-kyverno,kyverno-background-controller]
    [PodDisruptionBudget/?*,konflux-kyverno,kyverno-background-controller]
    [PodDisruptionBudget,konflux-kyverno,kyverno-cleanup-controller]
    [PodDisruptionBudget/?*,konflux-kyverno,kyverno-cleanup-controller]
    [PodDisruptionBudget,konflux-kyverno,kyverno-reports-controller]
    [PodDisruptionBudget/?*,konflux-kyverno,kyverno-reports-controller]
    [Service,konflux-kyverno,kyverno-svc]
    [Service/?*,konflux-kyverno,kyverno-svc]
    [Service,konflux-kyverno,kyverno-svc-metrics]
    [Service/?*,konflux-kyverno,kyverno-svc-metrics]
    [Service,konflux-kyverno,kyverno-background-controller-metrics]
    [Service/?*,konflux-kyverno,kyverno-background-controller-metrics]
    [Service,konflux-kyverno,kyverno-cleanup-controller]
    [Service/?*,konflux-kyverno,kyverno-cleanup-controller]
    [Service,konflux-kyverno,kyverno-cleanup-controller-metrics]
    [Service/?*,konflux-kyverno,kyverno-cleanup-controller-metrics]
    [Service,konflux-kyverno,kyverno-reports-controller-metrics]
    [Service/?*,konflux-kyverno,kyverno-reports-controller-metrics]
    [ServiceMonitor,konflux-kyverno,kyverno-admission-controller]
    [ServiceMonitor,konflux-kyverno,kyverno-background-controller]
    [ServiceMonitor,konflux-kyverno,kyverno-cleanup-controller]
    [ServiceMonitor,konflux-kyverno,kyverno-reports-controller]
    [Secret,konflux-kyverno,kyverno-svc.kyverno.svc.*]
    [Secret,konflux-kyverno,kyverno-cleanup-controller.kyverno.svc.*]
