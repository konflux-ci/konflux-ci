apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: konflux-kyverno
resources:
# renovate: datasource=git-refs depName=https://github.com/kyverno/kyverno versioning=semver
- https://github.com/kyverno/kyverno/releases/download/v1.17.1/install.yaml
- kyverno-rbac.yaml

patches:
# install.yaml pins SA subjects and ConfigMap filters to the default "kyverno"
# namespace; patch them to konflux-kyverno (see patches/*). Re-check on upgrade.
- path: patches/admission-controller-service-accounts.yaml
  target:
    kind: Deployment
    name: kyverno-admission-controller
- path: patches/kyverno-configmap-namespace.yaml
  target:
    kind: ConfigMap
    name: kyverno
- patch: |-
    - op: replace
      path: /metadata/name
      value: konflux-kyverno
  target:
    kind: Namespace
    name: kyverno
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: kyverno-background-controller
    namespace: konflux-kyverno
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: kyverno-cleanup-controller
    namespace: konflux-kyverno
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: kyverno-reports-controller
    namespace: konflux-kyverno
# Reduce kyverno-admission-controller resources to absolute minimum
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 1m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 1Mi
  target:
    kind: Deployment
    name: kyverno-admission-controller
    namespace: konflux-kyverno
# Reduce kyverno-background-controller resources to absolute minimum
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 1m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 1Mi
  target:
    kind: Deployment
    name: kyverno-background-controller
    namespace: konflux-kyverno
- patch: |-
    - op: add
      path: /spec/jobTemplate/spec/template/spec/containers/0/resources
      value:
        limits:
          cpu: 100m
          memory: 384Mi
        requests:
          cpu: 10m
          memory: 10Mi
  target:
    kind: CronJob
    namespace: konflux-kyverno
