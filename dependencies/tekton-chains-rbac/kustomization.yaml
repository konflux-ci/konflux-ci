apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base
  - openshift-compat.yaml

patchesJson6902:
  # Set EXTRA_NAMESPACE to also create public-key secret in openshift-pipelines namespace
  - target:
      group: batch
      version: v1
      kind: Job
      name: tekton-chains-signing-secret
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "openshift-pipelines"
