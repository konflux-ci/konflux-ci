# Lychee configuration for repository markdown link validation.
# Only ignore Hugo shortcode markers and other non-link template syntax.
include_mail = false
exclude = [
  '\{\{[<%]',
  '\}\}',
  '(?i)^%7b%7b%3c%20relref',  # URL-encoded Hugo shortcode {{< relref
  '^https?://localhost\b',
  '^https?://127\.',
  '^https?://10\.',
  '^https?://192\.168\.',
  '^https?://172\.(1[6-9]|2[0-9]|3[0-1])\.',
  '^https?://169\.254\.',
  '^https://gitlab\.cee\.redhat\.com',
  '^https://join\.slack\.com',
  '^https://www\.gnu\.org',
]
