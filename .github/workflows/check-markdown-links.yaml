name: Check Markdown Links

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - README.md
      - CONTRIBUTING.md
      - RELEASE.md
      - operator/README.md
      - operator/docs/content/**
      - .lychee.toml
      - .github/workflows/check-markdown-links.yaml
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --no-progress
            --config .lychee.toml
            --accept 200,429
            --max-retries 3
            --retry-wait-time 2
            --timeout 20
            README.md
            operator/README.md
            CONTRIBUTING.md
            RELEASE.md
            operator/docs/content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on scheduled failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: Check Markdown Links
        run: >-
          .github/scripts/create-or-update-issue.sh
          "⚠️ Check Markdown Links failed"
          "The scheduled markdown link check failed."
