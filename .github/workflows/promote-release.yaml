name: Promote Release

on:
  workflow_dispatch:
    inputs:
      release_candidate_tag:
        description: 'Release candidate tag to promote (e.g. v1.2.3-rc.2)'
        required: true
        type: string
      dry_run:
        description: 'Run e2e tests but skip actual promotion (for testing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

# Prevent concurrent promotions of the same RC tag to avoid race conditions.
# If the same RC tag is triggered multiple times, subsequent runs will queue
# and wait for the first to complete.
concurrency:
  group: promote-release-${{ github.event.inputs.release_candidate_tag }}
  cancel-in-progress: false

jobs:
  # E2E test jobs run in parallel. Each can be retried independently if it fails.
  e2e-ocp420-x86:
    name: E2E Tests (OCP 4.20 x86)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run OpenShift CI e2e test
        env:
          OPENSHIFT_CI_TOKEN: ${{ secrets.OPENSHIFT_CI_TOKEN }}
          RC_TAG: ${{ inputs.release_candidate_tag }}
        run: |
          .github/scripts/trigger-openshift-ci-tests.sh "$RC_TAG" "periodic-ci-konflux-ci-konflux-ci-main-ocp420-konflux-e2e-v420"

  e2e-ocp420-arm64:
    name: E2E Tests (OCP 4.20 ARM64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run OpenShift CI e2e test
        env:
          OPENSHIFT_CI_TOKEN: ${{ secrets.OPENSHIFT_CI_TOKEN }}
          RC_TAG: ${{ inputs.release_candidate_tag }}
        run: |
          .github/scripts/trigger-openshift-ci-tests.sh "$RC_TAG" "periodic-ci-konflux-ci-konflux-ci-main-ocp420-arm64-konflux-e2e-v420-arm64"

  # Promotion only runs after ALL e2e tests pass
  promote-release:
    name: Promote Release
    runs-on: ubuntu-latest
    needs: [e2e-ocp420-x86, e2e-ocp420-arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Promote release candidate to release tag
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ inputs.release_candidate_tag }}
        run: |
          .github/scripts/promote-release.sh "$RC_TAG"

  # Issue creation runs if any job fails
  create-issue-on-failure:
    name: Create Issue on Failure
    runs-on: ubuntu-latest
    needs: [e2e-ocp420-x86, e2e-ocp420-arm64, promote-release]
    if: ${{ failure() && !inputs.dry_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_NAME: Promote Release
          RC_TAG: ${{ inputs.release_candidate_tag }}
        run: |
          .github/scripts/create-or-update-issue.sh \
            "Release Promotion Failure" \
            "E2E tests or promotion failed for $RC_TAG. See workflow run for details."
