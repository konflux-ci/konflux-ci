name: Validate AGENTS.md file

on:
  push:
    branches:
      - main
    paths:
      - 'AGENTS.md'
  pull_request:
    paths:
      - 'AGENTS.md'
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  check-length:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Check AGENTS.md length (max 300 lines)
        run: |
          set -euo pipefail
          if [ ! -f AGENTS.md ]; then
            echo "AGENTS.md does not exist. Skipping check."
            exit 0
          fi
          lines=$(wc -l < AGENTS.md | xargs)
          echo "AGENTS.md line count: ${lines}"
          if [ "${lines}" -gt 300 ]; then
            echo "::error file=AGENTS.md::AGENTS.md has ${lines} lines (max 300)."
            exit 1
          fi
