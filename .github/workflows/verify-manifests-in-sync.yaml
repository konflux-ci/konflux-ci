name: Verify rendered manifests in sync

# kustomize, helm, and yq are expected on PATH (ubuntu-latest / ubuntu-slim images).
# cert-manager / trust-manager chart pins are defined in .github/scripts/export-third-party-chart-env.sh
# (Renovate/MintMaker per renovate.json).
#
# When verify fails on a pull_request, in-progress "Operator E2E Tests" runs for the same
# head commit are cancelled (with retries) so E2E does not deploy smee while manifests
# are out of sync. Add label force-run-e2e to opt out of cancellation.

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  check-changes:
    name: Check for relevant changes
    runs-on: ubuntu-slim
    outputs:
      manifests: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for changes
        uses: tj-actions/changed-files@v47
        id: changed-files
        with:
          files_from_source_file: .github/path-filters/verify-manifests-in-sync.txt

  verify-manifests:
    name: Verify upstream and third-party rendered manifests
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.check-changes.outputs.manifests == 'true'
    permissions:
      contents: read
      actions: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify manifests
        id: verify
        working-directory: ${{ github.workspace }}
        run: bash .github/scripts/verify-manifests-in-sync.sh

      - name: Cancel Operator E2E runs (manifests out of sync)
        if: >-
          failure() &&
          steps.verify.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: bash .github/scripts/cancel-operator-e2e-on-verify-failure.sh
