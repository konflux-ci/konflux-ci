# Title: Konflux Image Controller Configuration
# Description: KonfluxImageController configuration for image management with custom
#              resource limits and environment variables.
apiVersion: konflux.konflux-ci.dev/v1alpha1
kind: KonfluxImageController
metadata:
  labels:
    app.kubernetes.io/name: konflux-operator
    app.kubernetes.io/managed-by: kustomize
  name: konflux-image-controller
spec:
  imageControllerManager:
    replicas: 1
    manager:
      resources:
        requests:
          cpu: 100m
          memory: 20Mi
        limits:
          cpu: 500m
          memory: 2Gi
      env:
        - name: EXAMPLE_CUSTOM_CONFIG
          valueFrom:
            configMapKeyRef:
              name: image-controller-config
              key: custom-config
