# This patch adds the args, volumes, and ports to allow the manager to use the metrics-server certs.

# Add the volumeMount for the metrics-server certs
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    mountPath: /tmp/k8s-metrics-server/metrics-certs
    name: metrics-certs
    readOnly: true

# Add the --metrics-cert-path argument for the metrics server
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --metrics-cert-path=/tmp/k8s-metrics-server/metrics-certs

# Add the metrics-server certs volume configuration
# (tls.crt/tls.key only — scrapers use ca.crt from the same Secret)
#
# optional: false — kubelet will not start the manager if metrics-server-cert is missing.
# Pair with the namespace-local SelfSigned Issuer in config/certmanager/ so cert-manager can
# mint the Secret at install time (before KonfluxCertManager creates konflux-issuer).
# optional: true would not converge on konflux-issuer without a late-load certwatcher path.
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: metrics-certs
    secret:
      secretName: metrics-server-cert
      optional: false
      items:
        - key: tls.crt
          path: tls.crt
        - key: tls.key
          path: tls.key
