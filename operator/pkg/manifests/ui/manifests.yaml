apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dex-cert
  namespace: konflux-ui
spec:
  dnsNames:
  - localhost
  - dex.konflux-ui
  - dex.konflux-ui.svc.cluster.local
  isCA: true
  issuerRef:
    kind: Issuer
    name: ui-ca-issuer
  secretName: dex-cert
  subject:
    organizations:
    - konflux
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oauth2-proxy-cert
  namespace: konflux-ui
spec:
  dnsNames:
  - localhost
  issuerRef:
    kind: Issuer
    name: ui-ca-issuer
  secretName: oauth2-proxy-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: serving-cert
  namespace: konflux-ui
spec:
  dnsNames:
  - localhost
  - proxy.konflux-ui.svc
  - proxy.konflux-ui.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: ui-ca-issuer
  secretName: serving-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ui-ca
  namespace: konflux-ui
spec:
  commonName: ui-ca
  isCA: true
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: self-signed-cluster-issuer
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: ui-ca
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ui-ca-issuer
  namespace: konflux-ui
spec:
  ca:
    secretName: ui-ca
