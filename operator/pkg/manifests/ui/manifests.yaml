apiVersion: v1
data:
  Caddyfile: "{\n\tauto_https off\n\tadmin localhost:2019\n}\n\n# TODO: protect metrics
    with kube-rbac-proxy sidecar (https://github.com/openshift/kube-rbac-proxy)\n:2112
    {\n\tmetrics /metrics\n}\n\n:9443 {\n\ttls /mnt/tls.crt /mnt/tls.key\n\n\t# Strip
    any client-supplied impersonation and proxy-auth headers to\n\t# prevent spoofing.
    This runs at the server level, before any\n\t# handle/route blocks.\n\trequest_header
    -Impersonate-User\n\trequest_header -Impersonate-Group\n\trequest_header -Impersonate-Uid\n\trequest_header
    -Impersonate-Extra-*\n\trequest_header -X-User\n\trequest_header -X-Group\n\n\t#
    Health endpoint for liveness/readiness probes\n\thandle /health {\n\t\trespond
    200\n\t}\n\n\t# Segment bridge files\n\thandle /segment/* {\n\t\troot * /opt/app-root/src\n\t\theader
    Content-Type text/plain\n\t\tfile_server\n\t}\n\n\t# OAuth2 proxy - browser-facing
    auth UI/callback\n\thandle /oauth2/* {\n\t\treverse_proxy 127.0.0.1:6000\n\t}\n\n\t#
    Namespace lister (GET only on exact paths)\n\t# The namespace-lister performs
    in-memory RBAC authorization: it checks\n\t# RoleBindings for the user AND their
    groups to decide which namespaces\n\t# to return. Without group headers, a user
    only sees namespaces where\n\t# they are bound individually — group-based bindings
    are invisible.\n\t@nsListGet {\n\t\tmethod GET\n\t\tpath /api/k8s/api/v1/namespaces
    /api/k8s/api/v1/namespaces/\n\t}\n\thandle @nsListGet {\n\t\troute {\n\t\t\tforward_auth
    127.0.0.1:6000 {\n\t\t\t\turi /oauth2/auth\n\t\t\t\tcopy_headers X-Auth-Request-Email
    X-Auth-Request-Groups\n\t\t\t}\n\t\t\timpersonate {\n\t\t\t\ttarget_user X-User\n\t\t\t\ttarget_group
    X-Group\n\t\t\t}\n\t\t\trewrite * /api/v1/namespaces\n\t\t\treverse_proxy https://namespace-lister.namespace-lister.svc.cluster.local:8080
    {\n\t\t\t\theader_down -X-Correlation-ID\n\t\t\t\ttransport http {\n\t\t\t\t\tread_timeout
    30m\n\t\t\t\t\twrite_timeout 30m\n\t\t\t\t\ttls_trust_pool file /mnt/trusted-ca/ca-bundle.crt\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\t#
    Backend snippets (tekton-results, kubearchive, etc.) loaded from init-generated
    configs.\n\t# NOTE: Imported snippets MUST use paths more specific than /api/k8s/
    to avoid\n\t# shadowing the Kube API catch-all handler below. Caddy evaluates
    handle blocks\n\t# by specificity (longest path match first), so e.g. /api/k8s/plugins/tekton-results/\n\t#
    is safe because it is more specific than /api/k8s/.\n\timport /mnt/caddy-snippets/*.caddy\n\n\t#
    WebSocket to Kube API\n\thandle_path /wss/k8s/* {\n\t\troute {\n\t\t\tforward_auth
    127.0.0.1:6000 {\n\t\t\t\turi /oauth2/auth\n\t\t\t\tcopy_headers X-Auth-Request-Email
    X-Auth-Request-Groups\n\t\t\t}\n\t\t\timpersonate\n\t\t\treverse_proxy https://kubernetes.default.svc
    {\n\t\t\t\timport /mnt/caddy-snippets/kube-auth.conf\n\t\t\t\ttransport http {\n\t\t\t\t\tread_timeout
    30m\n\t\t\t\t\twrite_timeout 30m\n\t\t\t\t\ttls_trust_pool file /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\t#
    Kube API (catch-all for /api/k8s/)\n\thandle_path /api/k8s/* {\n\t\troute {\n\t\t\tforward_auth
    127.0.0.1:6000 {\n\t\t\t\turi /oauth2/auth\n\t\t\t\tcopy_headers X-Auth-Request-Email
    X-Auth-Request-Groups\n\t\t\t}\n\t\t\timpersonate\n\t\t\treverse_proxy https://kubernetes.default.svc
    {\n\t\t\t\timport /mnt/caddy-snippets/kube-auth.conf\n\t\t\t\ttransport http {\n\t\t\t\t\tread_timeout
    30m\n\t\t\t\t\twrite_timeout 30m\n\t\t\t\t\ttls_trust_pool file /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\n\t#
    Dex Identity Provider\n\thandle /idp/* {\n\t\treverse_proxy https://dex.konflux-ui.svc.cluster.local:9443
    {\n\t\t\theader_up X-Forwarded-Port \"9443\"\n\t\t\ttransport http {\n\t\t\t\ttls_trust_pool
    file /mnt/ca.crt\n\t\t\t}\n\t\t}\n\t}\n\n\t# Static SPA (catch-all, must be last)\n\thandle
    {\n\t\troot * /opt/app-root/src/static-content\n\t\ttry_files {path} /index.html\n\t\tfile_server\n\t}\n}\n"
kind: ConfigMap
metadata:
  name: proxy-caddyfile-m4ht65299t
  namespace: konflux-ui
