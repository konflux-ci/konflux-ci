    port: 9443
    protocol: TCP
    targetPort: web-tls
  - name: metrics
    port: 2112
    protocol: TCP
    targetPort: metrics
  selector:
    app: proxy
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dex
  name: dex
  namespace: konflux-ui
spec:
  progressDeadlineSeconds: 2147483647
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      containers:
      - command:
        - /usr/local/bin/dex
        - serve
        - /etc/dex/cfg/config.yaml
        env:
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: client-secret
              name: oauth2-proxy-client-secret
        image: quay.io/konflux-ci/dex@sha256:433278547867ecb6cb34d695dfceb3379b689f52e453abc661d0ea4b4d4f7d0b
        name: dex
        ports:
        - containerPort: 9443
