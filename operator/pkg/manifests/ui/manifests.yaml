---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    ignore-check.kube-linter.io/no-anti-affinity: Using topologySpreadConstraints
  labels:
    app: proxy
  name: proxy
  namespace: konflux-ui
spec:
  minReadySeconds: 30
  progressDeadlineSeconds: 2147483647
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: proxy
    spec:
      containers:
      - args:
        - /var/run/scripts/konflux-ci.dev/config-refresh.sh
        command:
        - bash
        image: quay.io/konflux-ci/konflux-ui@sha256:ba04b1f265e4dcdb38bbf289baee2173f6dcf6ee4bd1c6d4cdfb4fadbf2c5a82
        livenessProbe:
          exec:
            command:
            - sh
            - /var/run/scripts/konflux-ci.dev/config-refresh-probe.sh
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 30
        name: config-refresh
        resources:
          limits:
            cpu: 50m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /var/run/scripts/konflux-ci.dev/
          name: config-refresh-scripts
          readOnly: true
        - mountPath: /var/run/secrets/konflux-ci.dev/serviceaccount
          name: kube-api-token
          readOnly: true
        - mountPath: /var/run/secrets/konflux-ci.dev/backend
          name: backend-token
          readOnly: true
        - mountPath: /mnt/caddy-snippets
          name: caddy-snippets
        - mountPath: /etc/caddy/Caddyfile
          name: proxy-caddyfile
          readOnly: true
          subPath: Caddyfile
        - mountPath: /etc/caddy/impersonate-groups.conf
          name: proxy-caddyfile
          readOnly: true
          subPath: impersonate-groups.conf
        - mountPath: /etc/caddy/impersonate-headers.conf
          name: proxy-caddyfile
          readOnly: true
          subPath: impersonate-headers.conf
        - mountPath: /etc/caddy/ns-lister-headers.conf
          name: proxy-caddyfile
          readOnly: true
          subPath: ns-lister-headers.conf
      - command:
        - caddy
        - run
        - --config
        - /etc/caddy/Caddyfile
