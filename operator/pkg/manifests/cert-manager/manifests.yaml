apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: konflux-ca
  namespace: cert-manager
spec:
  commonName: konflux-ca
  isCA: true
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: konflux-bootstrap-issuer
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: konflux-ca-secret
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: konflux-issuer
  namespace: cert-manager
spec:
  ca:
    secretName: konflux-ca-secret
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: konflux-bootstrap-issuer
spec:
  selfSigned: {}
