apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: integration-service
  namespace: integration-service
spec:
  endpoints:
  - bearerTokenSecret:
      key: token
      name: prometheus-scrape-token
    interval: 15s
    path: /metrics
    port: https
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
  selector:
    matchLabels:
      control-plane: controller-manager
