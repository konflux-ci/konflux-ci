apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: integration-service
  namespace: integration-service
spec:
  endpoints:
  - bearerTokenSecret:
      key: token
      name: integration-service-metrics-reader
    interval: 15s
    path: /metrics
    port: http
    scheme: http
  selector:
    matchLabels:
      control-plane: controller-manager
