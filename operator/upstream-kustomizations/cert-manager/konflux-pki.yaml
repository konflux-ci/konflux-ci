---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: konflux-bootstrap-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: konflux-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: konflux-ca
  secretName: konflux-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: konflux-bootstrap-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: konflux-issuer
  namespace: cert-manager
spec:
  ca:
    secretName: konflux-ca-secret
