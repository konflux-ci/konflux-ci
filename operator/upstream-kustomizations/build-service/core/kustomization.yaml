apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/konflux-ci/build-service/config/default?ref=69fd53e17e0ed885dc2739626a866908d5abc209
  - build-pipeline-config.yaml
  - build-config-rolebinding.yaml
  - appstudio-pipelines-runner.yaml
  - build-pipeline-runner-rolebinding.yaml
  - appstudio-pipeline-scc.yaml

namespace: build-service

images:
  - name: quay.io/konflux-ci/build-service
    newName: quay.io/konflux-ci/build-service
    newTag: 69fd53e17e0ed885dc2739626a866908d5abc209

patches:
  - target:
      group: monitoring.coreos.com
      version: v1
      kind: ServiceMonitor
      name: build-service-controller-manager-metrics-monitor
    path: remove-service-monitor.yaml
  - target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: ClusterRole
      name: build-service-metrics-reader
    path: remove-metrics-reader-cluster-role.yaml
  - patch: |
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1liveness-port
        value: "Keeping upstream configs"
    target:
      kind: Deployment
      name: build-service-controller-manager
  - patch: |
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1readiness-port
        value: "Keeping upstream configs"
    target:
      kind: Deployment
      name: build-service-controller-manager
  - path: webhook-config-patch.yaml
    target:
      kind: Deployment
      name: build-service-controller-manager
  - patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "-webhook-config-path=/mnt/webhook-config.json"
    target:
      kind: Deployment
      name: build-service-controller-manager
