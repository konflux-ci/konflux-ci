---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: konflux-releaser-bot-actions
rules:
  - verbs:
      - list
      - get
      - watch
      - create
    apiGroups:
      - appstudio.redhat.com
    resources:
      - releases
  - verbs:
      - list
      - get
      - watch
      - create
    apiGroups:
      - appstudio.redhat.com
    resources:
      - snapshots
