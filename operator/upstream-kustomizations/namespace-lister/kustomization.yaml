apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- deployment.yaml
- namespace.yaml
- rbac.yaml
- service.yaml
- certificate.yaml
- network_policy_allow_to_apiserver.yaml
- network_policy_allow_from_konfluxui.yaml
namespace: namespace-lister
images:
- digest: sha256:c695bbc276039e5b6982c7168a7279db918f3460c5ea2e9137f00c072cd1c966
  name: quay.io/konflux-ci/namespace-lister
  newName: quay.io/konflux-ci/namespace-lister
patches:
# Prevent deployment failures during slow dependency setup
- target:
    group: apps
    version: v1
    kind: Deployment
  patch: |-
    - op: add
      path: /spec/progressDeadlineSeconds
      value: 2147483647
- path: ./patches/with_header_auth_user.yaml
  target:
    group: apps
    kind: Deployment
    name: namespace-lister
    namespace: namespace-lister
- path: ./patches/with_header_auth_groups.yaml
  target:
    group: apps
    kind: Deployment
    name: namespace-lister
    namespace: namespace-lister
