# Set user/group headers for the namespace-lister service.
# Client-supplied X-User and X-Group headers are stripped at the server
# level before reaching this handler.
request_header X-User {http.request.header.X-Auth-Request-Email}
request_header +X-Group {ig1}
request_header +X-Group {ig2}
request_header +X-Group {ig3}
request_header +X-Group {ig4}
request_header +X-Group {ig5}
request_header +X-Group {ig6}
request_header +X-Group {ig7}
request_header +X-Group {ig8}
request_header +X-Group {ig9}
request_header +X-Group {ig10}
request_header +X-Group "system:authenticated"
