# Set impersonation headers on the request. Client-supplied Impersonate-*
# headers are stripped at the server level before reaching this handler.
request_header Impersonate-User {http.request.header.X-Auth-Request-Email}
request_header +Impersonate-Group {ig1}
request_header +Impersonate-Group {ig2}
request_header +Impersonate-Group {ig3}
request_header +Impersonate-Group {ig4}
request_header +Impersonate-Group {ig5}
request_header +Impersonate-Group {ig6}
request_header +Impersonate-Group {ig7}
request_header +Impersonate-Group {ig8}
request_header +Impersonate-Group {ig9}
request_header +Impersonate-Group {ig10}
request_header +Impersonate-Group "system:authenticated"
