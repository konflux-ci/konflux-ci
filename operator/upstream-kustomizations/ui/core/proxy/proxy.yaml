---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: proxy
  name: proxy
  annotations:
    ignore-check.kube-linter.io/no-anti-affinity: "Using topologySpreadConstraints"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  minReadySeconds: 30
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: proxy
    spec:
      serviceAccountName: proxy
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: proxy
      initContainers:
      - name: copy-static-content
        image: quay.io/konflux-ci/konflux-ui
        command:
          - cp
          - -R
          - /opt/app-root/src/.
          - /mnt/static-content/
        volumeMounts:
        - name: static-content
          mountPath: /mnt/static-content
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        resources:
          limits:
            cpu: 50m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      - name: generate-proxy-config
        image: quay.io/konflux-ci/konflux-ui
        command:
          - sh
          - /var/run/scripts/konflux-ci.dev/generate-proxy-config.sh
        volumeMounts:
        - name: caddy-templates
          mountPath: /mnt/caddy-templates
          readOnly: true
        - name: caddy-snippets
          mountPath: /mnt/caddy-snippets
        - name: generate-proxy-config-script
          mountPath: /var/run/scripts/konflux-ci.dev
          readOnly: true
        - name: service-ca
          mountPath: /mnt/service-ca
          readOnly: true
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        resources:
          limits:
            cpu: 50m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      containers:
      - image: quay.io/konflux-ci/reverse-proxy
        name: reverse-proxy
        command:
          - caddy
          - run
          - --config
          - /etc/caddy/Caddyfile
          - --adapter
          - caddyfile
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 9443
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 60
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 9443
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        ports:
        - containerPort: 9443
          name: web-tls
          protocol: TCP
        - containerPort: 2112
          name: metrics
          protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 30m
            memory: 128Mi
        volumeMounts:
          - mountPath: /etc/caddy/Caddyfile
            subPath: Caddyfile
            name: proxy-caddyfile
            readOnly: true
          - name: serving-cert
            mountPath: /mnt/serving-cert
            readOnly: true
          - name: kube-api-token
            mountPath: /var/run/secrets/konflux-ci.dev/serviceaccount
            readOnly: true
          - name: backend-token
            mountPath: /var/run/secrets/konflux-ci.dev/backend
            readOnly: true
          - name: caddy-snippets
            mountPath: /mnt/caddy-snippets
            readOnly: true
          - name: trusted-ca
            mountPath: /mnt/trusted-ca
            readOnly: true
          - name: service-ca
            mountPath: /mnt/service-ca
            readOnly: true
          - name: static-content
            mountPath: /opt/app-root/src/static-content
          - name: segment-bridge-config
            mountPath: /opt/app-root/src/segment
          - name: caddy-data
            mountPath: /data
          - name: caddy-config
            mountPath: /config
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      - image: quay.io/konflux-ci/oauth2-proxy@sha256:latest
        name: oauth2-proxy
        env:
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-client-secret
              key: client-secret
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-cookie-secret
              key: cookie-secret
        ports:
          - containerPort: 6000
            name: web
            protocol: TCP
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 30m
            memory: 128Mi
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
      volumes:
        - name: generate-proxy-config-script
          configMap:
            defaultMode: 0750
            name: proxy-generate-config
            items:
              - key: generate-proxy-config.sh
                path: generate-proxy-config.sh
        - name: kube-api-token
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                expirationSeconds: 600
                path: token
        # Separate token for backend services (Tekton Results, KubeArchive, etc.).
        # The "konflux-backend" audience ensures this token is rejected by the
        # Kube API for direct operations, limiting blast radius if a backend is
        # compromised. Backend services validate it via TokenReview instead.
        - name: backend-token
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                audience: "konflux-backend"
                expirationSeconds: 600
                path: token
        - name: proxy-caddyfile
          configMap:
            defaultMode: 420
            name: proxy-caddyfile
            items:
              - key: Caddyfile
                path: Caddyfile
        - name: caddy-templates
          configMap:
            defaultMode: 420
            name: proxy-caddy-templates
        - name: caddy-snippets
          emptyDir: {}
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
        - name: serving-cert
          secret:
            secretName: serving-cert
        - name: trusted-ca
          configMap:
            name: trusted-ca
            optional: true
        - name: service-ca
          configMap:
            name: openshift-service-ca.crt
            optional: true
        - name: static-content
          emptyDir: {}
        - name: segment-bridge-config
          secret:
            secretName: segment-bridge-config
            optional: true
            items:
              - key: key
                path: key
              - key: url
                path: url

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: proxy
  name: proxy
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: web-tls
      port: 9443
      protocol: TCP
      targetPort: web-tls
    - name: metrics
      port: 2112
      protocol: TCP
      targetPort: metrics
  selector:
    app: proxy
