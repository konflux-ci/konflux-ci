kind: Kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
resources:
  - proxy.yaml
  - rbac.yaml

images:
- name: quay.io/konflux-ci/konflux-ui
  newName: quay.io/konflux-ci/konflux-ui
  digest: sha256:db1ed966d9d0d89a37b31cdec23684e653cd11e53387c549e6d381f4ba7811e1
- name: quay.io/konflux-ci/oauth2-proxy
  newName: quay.io/konflux-ci/oauth2-proxy
  digest: sha256:1f4a37529de4f750099af18e113556bd995fe6922030c614b7d6d23eaa0bd318
- name: registry.access.redhat.com/ubi9/nginx-124
  digest: sha256:6cfc252017036e3a6b5eaff546ac72d1a2fe8d3aec1d3a4305f40cded79331e0

configMapGenerator:
  - name: proxy
    files:
      - nginx.conf
  - name: proxy-nginx-templates
    files:
      - auth.conf
      - tekton-results.conf
  - name: proxy-nginx-run
    files:
    - proxy-nginx-run.sh
    options:
      disableNameSuffixHash: true
  - name: proxy-nginx-generate-loop
    files:
    - proxy-nginx-generate-loop.sh
    - proxy-nginx-generate-loop-probe.sh
    options:
      disableNameSuffixHash: true

namespace: konflux-ui
