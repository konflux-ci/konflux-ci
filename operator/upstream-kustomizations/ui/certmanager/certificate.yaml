---
# Self-signed root CA for the konflux-ui namespace.
# This is the trust anchor for the OpenShift Route's TLS re-encryption:
# the Ingress annotation route.openshift.io/destination-ca-certificate-secret
# points at this Secret. Because it is self-signed, tls.crt contains a
# CA:TRUE cert that HAProxy can use as a root trust anchor without needing
# any parent CA in the chain.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ui-ca
spec:
  isCA: true
  commonName: ui-ca
  secretName: ui-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: konflux-bootstrap-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Namespace-scoped CA Issuer backed by the ui-ca Secret above.
# Used to issue leaf certificates within the konflux-ui namespace.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ui-ca-issuer
spec:
  ca:
    secretName: ui-ca
---
# Leaf certificate for the proxy's TLS serving endpoint (Caddy on port 9443).
# Issued by the namespace CA Issuer so the CA chain stays within konflux-ui.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: serving-cert
spec:
  dnsNames:
  # TODO: don't include localhost by default. make it configurable.
  - localhost
  - proxy.konflux-ui.svc
  - proxy.konflux-ui.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: ui-ca-issuer
  secretName: serving-cert
---
# Reference certificate whose sole purpose is to surface the cluster root CA
# (from konflux-issuer / konflux-ca-secret) in this namespace. The proxy mounts
# its ca.crt field to verify namespace-lister TLS, which is issued by
# konflux-issuer.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cluster-root-ref
spec:
  commonName: cluster-root-ref
  dnsNames:
    - cluster-root-ref.konflux-ui.svc
  secretName: cluster-root-ref
  issuerRef:
    name: konflux-issuer
    kind: ClusterIssuer
    group: cert-manager.io
