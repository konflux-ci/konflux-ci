---
# CA Certificate: creates a sub-CA under the shared cluster root (ca-issuer)
# in the konflux-ui namespace.
# The resulting Secret (ui-ca) contains:
#   tls.crt = the sub-CA cert (CA:TRUE) — referenced by the Ingress annotation
#             route.openshift.io/destination-ca-certificate-secret for TLS re-encryption
#   ca.crt  = the cluster root CA — used by the proxy to verify namespace-lister TLS
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ui-ca
spec:
  isCA: true
  commonName: ui-ca
  secretName: ui-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Namespace-scoped CA Issuer backed by the ui-ca Secret above.
# Used to issue leaf certificates within the konflux-ui namespace.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ui-ca-issuer
spec:
  ca:
    secretName: ui-ca
---
# Leaf certificate for the proxy's TLS serving endpoint (nginx on port 9443).
# Issued by the namespace CA Issuer so the CA chain stays within konflux-ui.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: serving-cert
spec:
  dnsNames:
  # TODO: don't include localhost by default. make it configurable.
  - localhost
  - proxy.konflux-ui.svc
  - proxy.konflux-ui.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: ui-ca-issuer
  secretName: serving-cert
