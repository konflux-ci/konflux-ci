apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - core
  - internal-services
  - certmanager
  - ./monitoring

patches:
  # Prevent deployment failures during slow dependency setup
  - target:
      group: apps
      version: v1
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/progressDeadlineSeconds
        value: 2147483647
  # Operator-owned HTTPS metrics: upstream still defaults to HTTP :8080 / metrics-secure=false.
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: release-service-controller-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args/0
        value: --metrics-bind-address=:8443
      - op: add
        path: /spec/template/spec/containers/0/args/1
        value: --metrics-secure=true
  - target:
      version: v1
      kind: Service
      name: release-service-controller-manager-metrics-service
    patch: |-
      - op: replace
        path: /spec/ports/0/name
        value: https
      - op: replace
        path: /spec/ports/0/port
        value: 8443
      - op: replace
        path: /spec/ports/0/targetPort
        value: 8443
  # Remove OpenShift-specific annotations as cert-manager is used for creating and injecting TLS secrets
  - target:
      kind: ValidatingWebhookConfiguration
      name: release-service-validating-webhook-configuration
    patch: |-
      - op: remove
        path: /metadata/annotations/service.beta.openshift.io~1inject-cabundle
  - target:
      kind: MutatingWebhookConfiguration
      name: release-service-mutating-webhook-configuration
    patch: |-
      - op: remove
        path: /metadata/annotations/service.beta.openshift.io~1inject-cabundle
  - target:
      kind: Service
      name: release-service-webhook-service
    patch: |-
      - op: remove
        path: /metadata/annotations/service.beta.openshift.io~1serving-cert-secret-name

replacements:
  - source: # Add cert-manager annotation to ValidatingWebhookConfiguration, MutatingWebhookConfiguration and CRDs
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert # this name should match the one in certificate.yaml
      fieldPath: .metadata.namespace # namespace of the certificate CR
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
      - select:
          kind: CustomResourceDefinition
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 0
          create: true
  - source:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: serving-cert # this name should match the one in certificate.yaml
      fieldPath: .metadata.name
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true
      - select:
          kind: CustomResourceDefinition
        fieldPaths:
          - .metadata.annotations.[cert-manager.io/inject-ca-from]
        options:
          delimiter: '/'
          index: 1
          create: true
  - source: # Add cert-manager annotation to the webhook Service
      kind: Service
      version: v1
      name: release-service-webhook-service
      fieldPath: .metadata.name # namespace of the service
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: '.'
          index: 0
          create: true
  - source:
      kind: Service
      version: v1
      name: release-service-webhook-service
      fieldPath: .metadata.namespace # namespace of the service
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: '.'
          index: 1
          create: true
