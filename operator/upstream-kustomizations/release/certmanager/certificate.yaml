# The following manifests contain a self-signed issuer CR and a certificate CR.
# More document can be found at https://docs.cert-manager.io
# WARNING: Targets CertManager v1.0. Check https://cert-manager.io/docs/installation/upgrading/ for breaking changes.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  labels:
    app.kubernetes.io/name: certificate
    app.kubernetes.io/instance: serving-cert
    app.kubernetes.io/component: certificate
  name: selfsigned-issuer
  namespace: release-service
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/name: certificate
    app.kubernetes.io/instance: serving-cert
    app.kubernetes.io/component: certificate
  name: serving-cert
  namespace: release-service
spec:
  # SERVICE_NAME and SERVICE_NAMESPACE will be substituted by kustomize
  dnsNames:
  - SERVICE_NAME.SERVICE_NAMESPACE.svc
  - SERVICE_NAME.SERVICE_NAMESPACE.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: webhook-server-cert # this secret will not be prefixed, since it's not managed by kustomize
---
# Metrics serving certificate (konflux-issuer), separate from webhook serving-cert.
# cert-manager writes tls.crt/tls.key and ca.crt atomically into metrics-server-cert.
# ServiceMonitors trust ca.crt from that same Secret; pods mount tls.crt/tls.key only.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/name: metrics-certificate
    app.kubernetes.io/instance: metrics-certs
    app.kubernetes.io/component: certificate
  name: metrics-certs
  namespace: release-service
spec:
  # SERVICE_NAME and SERVICE_NAMESPACE are substituted by kustomize replacements.
  dnsNames:
  - SERVICE_NAME.SERVICE_NAMESPACE.svc
  - SERVICE_NAME.SERVICE_NAMESPACE.svc.cluster.local
  issuerRef:
    kind: ClusterIssuer
    group: cert-manager.io
    name: konflux-issuer
  secretName: metrics-server-cert
